services:
  postgres:
    profiles:
      - dev
    image: postgres:18.2-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "${FOOD_INV_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${FOOD_INV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${FOOD_INV_POSTGRES_PASSWORD}
      POSTGRES_DB: ${FOOD_INV_POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
